* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #000; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

/* ===== PC版 (4:3) ===== */
#outer {
  width: min(100vw, 133.33vh);
  aspect-ratio: 4/3;
  background: #000;
  overflow: hidden;
  display: flex;
  position: relative;
}
#app {
  width: 100%;
  color: #00ff41;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  padding: 2% 3%;
}

/* ===== スマホ版：縦画面で幅が600px未満 ===== */
@media (max-width: 600px) {
  html, body { align-items: flex-start; }
  #outer {
    width: 100vw;
    aspect-ratio: unset;
    min-height: 100vh;
  }
  #app { padding: 4% 4%; }

  h1 { font-size: 7vw !important; margin-bottom: 3% !important; }

  .settings-grid { grid-template-columns: 1fr 1fr !important; gap: 3% !important; }
  .setting-label { font-size: 4vw !important; }
  .setting-input { font-size: 9vw !important; padding: 5% 2% !important; }
  .setting-hint { font-size: 3vw !important; }
  .toggle-label { font-size: 3.5vw !important; }
  .btn { font-size: 5vw !important; padding: 6% 0 !important; }
  .mode-card { grid-column: 1 / -1; }

  #minus-sign { font-size: 22vw !important; }
  #number-display { font-size: 22vw !important; max-width: 90vw; overflow: hidden; }

  .ans-label { font-size: 5vw !important; }
  #answer-input { font-size: 19vw !important; }
  .ans-btn { font-size: 5vw !important; }

  #r-icon { font-size: 20vw !important; }
  #r-correct { font-size: 16vw !important; }
  .result-btns-3 { grid-template-columns: 1fr !important; width: 90% !important; }
  .result-btns-3 .btn { font-size: 4.5vw !important; padding: 4% 0 !important; }
  .result-btns-1 { width: 80% !important; }
  .result-btns-1 .btn { font-size: 5vw !important; }

  .spinner-wrap { width: 55vw !important; height: 55vw !important; }

  #progress-indicator { font-size: 3.5vw !important; }
}

.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }
h1 { font-size: clamp(20px,4vw,42px); font-weight: 500; color: #00ff41; text-align: center; margin-bottom: 2%; letter-spacing: 3px; }

.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2%; flex: 1; }
.setting-card { background: #0a0a0a; border: 0.5px solid #00aa22; border-radius: 8px; padding: 4% 6%; display: flex; flex-direction: column; justify-content: center; }
.setting-label { font-size: clamp(14px,2.8vw,30px); color: #009900; letter-spacing: 1px; margin-bottom: 4%; }
.setting-input { background: #000; border: 1px solid #00ff41; border-radius: 6px; color: #00ff41; font-family: 'Abacus2', 'Courier New', monospace; font-size: clamp(36px,8vw,88px); font-weight: 500; text-align: center; width: 100%; padding: 4% 2%; outline: none; -moz-appearance: textfield; }
.setting-input::-webkit-outer-spin-button, .setting-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.setting-input:focus { box-shadow: 0 0 0 2px #002200; }
.setting-hint { font-size: clamp(10px,1.8vw,20px); color: #005500; margin-top: 3%; text-align: center; }

.mode-card { background: #0a0a0a; border: 0.5px solid #00aa22; border-radius: 8px; padding: 4% 6%; display: flex; flex-direction: column; justify-content: center; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6%; }
.toggle-label { font-size: clamp(13px,2.5vw,28px); color: #00aa22; }
.toggle { position: relative; width: 60px; height: 32px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #003300; border: 0.5px solid #00ff41; border-radius: 16px; cursor: pointer; transition: 0.2s; }
.toggle-slider:before { content:''; position:absolute; width:24px; height:24px; left:3px; top:3px; background:#006600; border-radius:50%; transition:0.2s; }
.toggle input:checked + .toggle-slider:before { background:#00ff41; transform:translateX(28px); }

.btn { display:block; width:100%; background:transparent; border:1px solid #00ff41; border-radius:8px; color:#00ff41; font-family:'Courier New',monospace; font-size:clamp(14px,2.8vw,30px); cursor:pointer; letter-spacing:1px; transition:background 0.15s; text-align:center; padding:8% 0; }
.btn:hover { background:#002200; }
.btn:active { background:#003300; }
.btn-dim { border-color:#004400; color:#004400; }
.btn-dim:hover { background:#001100; border-color:#007700; color:#007700; }

#countdown-screen { align-items:center; justify-content:center; }
.spinner-wrap { position:relative; width:min(55vw,55vh); height:min(55vw,55vh); }
#spinner-svg { width:100%; height:100%; transform:rotate(-90deg); }
#spinner-track { fill:none; stroke:#002200; stroke-width:5; }
#spinner-arc { fill:none; stroke:#00ff41; stroke-width:5; stroke-linecap:round; stroke-dasharray:339.3; stroke-dashoffset:339.3; }

#flash-screen { align-items:center; justify-content:center; }
#number-row { position:relative; display:flex; align-items:center; justify-content:center; flex:1; width:100%; }
#minus-sign {
  font-size:clamp(80px,20vw,220px);
  font-weight:500; color:#00ff41; line-height:1;
  font-family:'Abacus2','Courier New',monospace;
  visibility:hidden;
  flex-shrink:0;
}
#number-display {
  font-size:clamp(80px,20vw,220px);
  font-weight:500; color:#00ff41; line-height:1;
  letter-spacing:2px; font-variant-numeric:tabular-nums;
  font-family:'Abacus2','Courier New',monospace;
  text-align:center;
}

#answer-screen { align-items:center; justify-content:center; gap:0; }
.ans-label { color:#00aa22; font-size:clamp(16px,3.5vw,40px); margin-bottom:2%; letter-spacing:1px; font-weight:500; text-align:center; }
.ans-input-wrap { width:90%; display:flex; align-items:center; justify-content:center; flex:1; }
#answer-input { background:#000; border:3px solid #00ff41; border-radius:12px; color:#00ff41; font-family:'Abacus2',monospace; font-size:clamp(40px,19vw,210px); font-weight:500; text-align:center; width:100%; height:100%; padding:1% 2%; outline:none; line-height:1.1; -moz-appearance:textfield; display:block; }
#answer-input::-webkit-outer-spin-button, #answer-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
#answer-input:focus { box-shadow:0 0 0 4px #002200; }
.ans-btn { margin-top:2%; width:60%; font-size:clamp(14px,2.5vw,26px); padding:2% 0; }

#result-screen { align-items:center; justify-content:center; flex:1; }
.result-main { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; width:100%; gap:3%; }
#r-icon { font-size:clamp(36px,14vw,160px); line-height:1; font-family:'Courier New',monospace; }
#r-correct { font-size:clamp(28px,12vw,140px); font-weight:500; line-height:1; font-family:'Abacus2','Courier New',monospace; }
.result-btns-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:2%; width:92%; padding-bottom:1%; }
.result-btns-3 .btn { padding:3% 0; font-size:clamp(10px,1.8vw,20px); }
.result-btns-1 { width:60%; padding-bottom:1%; }
.result-btns-1 .btn { padding:3% 0; font-size:clamp(13px,2.5vw,26px); }
.btn-dim { border-color:#00ff41; color:#00ff41; }#progress-indicator { font-size:clamp(12px,2vw,22px); color:#004400; letter-spacing:2px; text-align:center; margin-bottom:2%; }
</style>
</head>
<body>
<div id="outer"><div id="app">
  <h1>▶ FLASH ANZAN</h1>

  <div id="settings-screen" class="screen active">
    <div class="settings-grid">
      <div class="setting-card"><div class="setting-label">口数（個）</div><input type="number" class="setting-input" id="count" min="2" max="30" value="5"><div class="setting-hint">2 〜 30</div></div>
      <div class="setting-card"><div class="setting-label">桁数</div><input type="number" class="setting-input" id="digits" min="1" max="4" value="2"><div class="setting-hint">1 〜 4</div></div>
      <div class="setting-card"><div class="setting-label">合計表示時間（秒）</div><input type="number" class="setting-input" id="totaltime" min="0.10" max="99.99" value="2.50" step="0.01"><div class="setting-hint">0.10 〜 99.99秒</div></div>
      <div class="setting-card"><div class="setting-label">問題数</div><input type="number" class="setting-input" id="qcount" min="1" max="99" value="1"><div class="setting-hint">1 〜 99問</div></div>
      <div class="mode-card"><div class="setting-label">演算モード</div><div class="toggle-row"><span class="toggle-label">加算のみ</span><label class="toggle"><input type="checkbox" id="subtraction"><span class="toggle-slider"></span></label><span class="toggle-label">加減算</span></div></div>
      <div style="display:flex;flex-direction:column;justify-content:center;"><button class="btn" onclick="beginSession()">▶ スタート</button></div>
    </div>
  </div>

  <div id="countdown-screen" class="screen">
    <div id="progress-indicator"></div>
    <div class="spinner-wrap" style="margin:auto;">
      <svg id="spinner-svg" viewBox="0 0 120 120">
        <circle id="spinner-track" cx="60" cy="60" r="54"/>
        <circle id="spinner-arc" cx="60" cy="60" r="54"/>
      </svg>
    </div>
  </div>

  <div id="flash-screen" class="screen">
    <div id="number-row"><span id="minus-sign">−</span><span id="number-display">　</span></div>
  </div>

  <div id="answer-screen" class="screen">
    <div class="ans-label" id="ans-progress-label">答えを入力してください</div>
    <div class="ans-input-wrap"><input type="number" id="answer-input" placeholder="？"></div>
    <button class="btn ans-btn" onclick="checkAnswer()">決定 [Enter]</button>
  </div>

  <div id="result-screen" class="screen">
    <div class="result-main"><div id="r-icon"></div><div id="r-correct"></div></div>
    <div id="result-btns-wrap"></div>
  </div>
</div></div>

<script>
let numbers=[],operators=[],currentIdx=0,countdownRaf=null,cachedSpeedSec=0.5;
let savedNumbers=[],savedOperators=[],savedAnswer=0;
let totalQuestions=1,currentQuestion=0,sessionCorrect=0;
let sessionCount=5,sessionDigits=2,sessionAllowSub=false;

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goSettings(){showScreen('settings-screen');}
function randInt(d){const mn=Math.pow(10,d-1),mx=Math.pow(10,d)-1;return Math.floor(Math.random()*(mx-mn+1))+mn;}
function generateNumbers(count,digits,allowSub){
  while(true){
    const nums=[],ops=[];nums.push(randInt(digits));let running=nums[0];
    let hasMinus=false;
    for(let i=1;i<count;i++){
      const isLast=i===count-1;
      let op='+',n=randInt(digits);
      const canSub=running-n>=0;
      if(allowSub&&canSub&&(Math.random()<0.5||(isLast&&!hasMinus))){op='-';running-=n;hasMinus=true;}
      else{running+=n;}
      nums.push(n);ops.push(op);
    }
    if(!allowSub||hasMinus)return{nums,ops,answer:running};
  }
}
function beginSession(){
  totalQuestions=Math.max(1,parseInt(document.getElementById('qcount').value)||1);
  sessionCount=Math.max(2,parseInt(document.getElementById('count').value)||5);
  sessionDigits=Math.min(4,Math.max(1,parseInt(document.getElementById('digits').value)||2));
  const totalTime=Math.max(0.10,parseFloat(document.getElementById('totaltime').value)||2.5);
  sessionAllowSub=document.getElementById('subtraction').checked;
  cachedSpeedSec=totalTime/sessionCount;
  currentQuestion=0;sessionCorrect=0;nextQuestion(false);
}
function nextQuestion(useSaved){
  currentQuestion++;
  if(!useSaved){const{nums,ops,answer}=generateNumbers(sessionCount,sessionDigits,sessionAllowSub);savedNumbers=[...nums];savedOperators=[...ops];savedAnswer=answer;numbers=nums;operators=ops;window._answer=answer;}
  else{numbers=[...savedNumbers];operators=[...savedOperators];window._answer=savedAnswer;}
  currentIdx=0;startCountdown();
}
function startCountdown(){
  document.getElementById('progress-indicator').textContent=totalQuestions>1?('第 '+currentQuestion+' / '+totalQuestions+' 問'):'';
  showScreen('countdown-screen');
  const arc=document.getElementById('spinner-arc'),C=339.3;
  arc.style.strokeDashoffset=C;let t0=null;
  function animate(ts){if(!t0)t0=ts;const el=ts-t0;if(el>=2000){arc.style.strokeDashoffset=0;setTimeout(startFlash,80);return;}arc.style.strokeDashoffset=C*(1-(el%1000)/1000);countdownRaf=requestAnimationFrame(animate);}
  countdownRaf=requestAnimationFrame(animate);
}
function startFlash(){showScreen('flash-screen');flashNext();}
function flashNext(){
  if(currentIdx>=numbers.length){showAnswerScreen();return;}
  const ms=Math.round(cachedSpeedSec*1000),numEl=document.getElementById('number-display'),minusEl=document.getElementById('minus-sign');
  const isMinus=currentIdx>0&&operators[currentIdx-1]==='-';
  minusEl.style.visibility=isMinus?'visible':'hidden';numEl.textContent=numbers[currentIdx];currentIdx++;
  setTimeout(()=>{numEl.textContent='　';minusEl.style.visibility='hidden';setTimeout(flashNext,50);},ms);
}
function showAnswerScreen(){
  showScreen('answer-screen');
  document.getElementById('ans-progress-label').textContent=totalQuestions>1?('第 '+currentQuestion+' / '+totalQuestions+' 問　答えを入力してください'):'答えを入力してください';
  const inp=document.getElementById('answer-input');inp.value='';setTimeout(()=>inp.focus(),100);
}
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('answer-screen').classList.contains('active'))checkAnswer();
  else if(document.getElementById('result-screen').classList.contains('active')){const nb=document.getElementById('next-btn');if(nb)nb.click();}
});
function checkAnswer(){
  const userAnswer=parseInt(document.getElementById('answer-input').value),correct=window._answer,ok=userAnswer===correct;
  if(ok)sessionCorrect++;
  const icon=document.getElementById('r-icon');
  const rCorrect=document.getElementById('r-correct');
  icon.textContent=ok?'○':'×';
  icon.style.color=ok?'#00ff41':'#ff4444';
  rCorrect.textContent=String(correct);
  rCorrect.style.color=ok?'#00ff41':'#ff4444';
  const wrap=document.getElementById('result-btns-wrap'),isLast=currentQuestion>=totalQuestions;
  if(!isLast){
    wrap.className='result-btns-1';
    wrap.innerHTML='<button class="btn" id="next-btn" onclick="nextQuestion(false)">次の問題へ [Enter]</button>';
  }else{
    wrap.className='result-btns-3';
    wrap.innerHTML='<button class="btn" onclick="nextQuestion(true)">同じ問題をもう一度</button><button class="btn btn-dim" onclick="restartNew()">同じ設定で新しい問題</button><button class="btn btn-dim" onclick="goSettings()">設定を変える</button>';
  }
  showScreen('result-screen');
}
function restartNew(){currentQuestion=0;sessionCorrect=0;nextQuestion(false);}
</script>
</body>
</html>
